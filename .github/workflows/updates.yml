name: Update Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Dashboard Updater
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
        run: python bridge.py

      - name: Commit and Push if data changed
        run: |
          git config --global user.name "Dashboard-Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --staged --quiet || (git commit -m "Auto-update data" && git push)
