<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI/Bio Command Center</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; margin-bottom: 15px; }
        .search-bar { width: 100%; padding: 15px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 30px; }
        .price { color: #3fb950; font-weight: bold; }
        .reddit-item { margin-bottom: 12px; font-size: 0.9rem; }
        a { color: var(--accent); text-decoration: none; }
        .tag { font-size: 0.7rem; background: #21262d; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

    <form action="https://www.google.com/search" method="get">
        <input type="text" name="q" class="search-bar" placeholder="Google Search | Use 'site:reddit.com' for niche threads..." autofocus>
    </form>

    <div class="grid">
        <div class="card">
            <div class="header"><h3>🏆 Intelligence Ranking</h3><small>via Artificial Analysis</small></div>
            <div id="ai-list">Loading...</div>
        </div>

        <div class="card">
            <div class="header"><h3>🧬 WGS Price Watch</h3><span class="tag">Real-time</span></div>
            <div id="wgs-list">Loading...</div>
        </div>

        <div class="card">
            <div class="header"><h3>🔴 u/Drwillpowers</h3><span class="tag">New Posts</span></div>
            <div id="reddit-list">Loading...</div>
        </div>

        <div class="card">
            <div class="header"><h3>📩 AI Email Filter</h3></div>
            <p>Direct jumps to prioritized threads:</p>
            <a href="https://mail.google.com/mail/u/0/#search/17-hydroxyprogesterone+OR+monogenic" target="_blank">🧬 Lab Results & Bio Threads</a><br><br>
            <a href="https://mail.google.com/mail/u/0/#search/is%3Aimportant+newer_than%3A1d" target="_blank">🔥 Last 24 Hours (High Priority)</a>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // Populate AI
                document.getElementById('ai-list').innerHTML = data.ai_leaderboard.map(m => 
                    `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>${m.model}</span> <strong>${m.elo}</strong>
                    </div>`).join('');

                // Populate WGS
                document.getElementById('wgs-list').innerHTML = data.wgs_price.map(p => 
                    `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>${p.provider}</span> <span class="price">${p.price}</span>
                    </div>`).join('');

                // Populate Reddit
                document.getElementById('reddit-list').innerHTML = data.reddit.map(r => 
                    `<div class="reddit-item"><a href="${r.link}" target="_blank">${r.title}</a></div>`).join('');

            } catch (e) { console.error("Could not load data.json. Make sure bridge.py is running."); }
        }
        setInterval(loadData, 5000); // Refresh view every 5 seconds
        loadData();
    </script>
</body>
</html>
